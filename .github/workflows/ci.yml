name: CI Microservices

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      # --- ÉTAPE MAVEN : Compilation et Tests ---
      - name: Build Config Service
        run: |
          cd config-service
          mvn clean install

      - name: Build Discovery Service
        run: |
          cd discovery-service
          mvn clean install

      - name: Build Catalogue Service
        run: |
          cd catalogue-service
          mvn clean install

      - name: Build Commande Service
        run: |
          cd commande-service
          mvn clean install

      - name: Build Paiement Service
        run: |
          cd paiement-service
          mvn clean install

      - name: Build Gateway Service
        run: |
          cd gateway-service
          mvn clean install

      # --- ÉTAPE DOCKER (Partie 7 du TP) ---
      - name: Build Docker image Catalogue
        run: |
          cd catalogue-service
          docker build -t catalogue-service:1.0 .

      - name: Build Docker image Commande
        run: |
          cd commande-service
          docker build -t commande-service:1.0 .
