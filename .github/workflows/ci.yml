name: CI Microservices

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Build Product Service
        run: |
          cd product-service
          mvn clean install

      - name: Build Order Service
        run: |
          cd order-service
          mvn clean install
          
      # Ajoute ici les autres services (catalogue, paiement...) sur le même modèle
