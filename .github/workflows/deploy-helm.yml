name: Deploy Microservices on Kubernetes with Helm

on:
  push:
    branches:
      - main

jobs:
  helm-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupération du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Configuration de Java 21
      - name: Setup Java 21
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '21'

      # 3. Compilation de chaque microservice (via son propre pom.xml)
      - name: Build Microservices
        run: |
          mvn clean package -DskipTests -f ./config-service/pom.xml
          mvn clean package -DskipTests -f ./discovery-service/pom.xml
          mvn clean package -DskipTests -f ./gateway-service/pom.xml
          mvn clean package -DskipTests -f ./catalogue-service/pom.xml
          mvn clean package -DskipTests -f ./commande-service/pom.xml
          mvn clean package -DskipTests -f ./paiement-service/pom.xml

      # 4. Construction des images Docker avec ton pseudo d4vid93
      - name: Build Docker Images
        run: |
          docker build -t d4vid93/config-service:latest ./config-service
          docker build -t d4vid93/discovery-service:latest ./discovery-service
          docker build -t d4vid93/gateway-service:latest ./gateway-service
          docker build -t d4vid93/catalogue-service:latest ./catalogue-service
          docker build -t d4vid93/commande-service:latest ./commande-service
          docker build -t d4vid93/paiement-service:latest ./paiement-service

      # 5. Connexion à Docker Hub (Utilise tes secrets GitHub)
      - name: Docker Hub Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Envoi des images sur Docker Hub
      - name: Push Docker Images
        run: |
          docker push d4vid93/config-service:latest
          docker push d4vid93/discovery-service:latest
          docker push d4vid93/gateway-service:latest
          docker push d4vid93/catalogue-service:latest
          docker push d4vid93/commande-service:latest
          docker push d4vid93/paiement-service:latest

      # 6.5 Créer un cluster Kubernetes temporaire pour le test
      - name: Create Kind Cluster
        uses: helm/kind-action@v1.4.0

      # 7. Installation de Helm
      - name: Setup Helm
        uses: azure/setup-helm@v3

      # 8. Déploiement sur Kubernetes avec Helm
      - name: Deploy Services with Helm
        run: |
          helm upgrade --install config-service ./charts/config-service
          helm upgrade --install discovery-service ./charts/discovery-service
          helm upgrade --install gateway-service ./charts/gateway-service
          helm upgrade --install catalogue-service ./charts/catalogue-service
          helm upgrade --install commande-service ./charts/commande-service
          helm upgrade --install paiement-service ./charts/paiement-service